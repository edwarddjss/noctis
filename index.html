<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOCTIS | Advanced Gamma Control</title>
    <style>
        :root {
            --bg: #000000;
            --frame: #111111;
            --text: #F0F0F0;
            --text-dim: #666666;
            --accent: #FF9F43;
            /* Amber Night Vision */
            --glow: rgba(255, 159, 67, 0.4);
        }

        body {
            background-color: var(--bg);
            font-family: 'Segoe UI', system-ui, sans-serif;
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            /* No gradient, just void */
        }

        .container {
            text-align: center;
            max-width: 800px;
            padding: 40px;
            border: 1px solid #222;
            background: #050505;
            position: relative;
        }

        /* Brutalist corners */
        .container::before {
            content: '';
            position: absolute;
            top: -1px;
            left: -1px;
            width: 10px;
            height: 10px;
            border-top: 2px solid var(--text-dim);
            border-left: 2px solid var(--text-dim);
        }

        .container::after {
            content: '';
            position: absolute;
            bottom: -1px;
            right: -1px;
            width: 10px;
            height: 10px;
            border-bottom: 2px solid var(--text-dim);
            border-right: 2px solid var(--text-dim);
        }

        h1 {
            font-size: 7rem;
            margin: 0;
            font-weight: 800;
            letter-spacing: -4px;
            line-height: 1;
            text-transform: lowercase;
            color: #fff;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
        }

        p.subtitle {
            font-size: 1.2rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-top: 10px;
            margin-bottom: 50px;
            font-weight: 600;
        }

        .btn {
            background-color: var(--bg);
            color: var(--accent);
            border: 2px solid var(--accent);
            padding: 20px 60px;
            font-size: 1.2rem;
            font-weight: bold;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.2s ease;
            display: inline-block;
            position: relative;
            overflow: hidden;
        }

        .btn:hover {
            background-color: var(--accent);
            color: #000;
            box-shadow: 0 0 30px var(--glow);
        }

        .meta {
            margin-top: 60px;
            color: var(--text-dim);
            font-size: 0.8rem;
            font-family: 'Consolas', monospace;
        }

        .meta a {
            color: var(--text-dim);
            text-decoration: none;
            border-bottom: 1px solid #333;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>noctis</h1>
        <p class="subtitle">Night Vision for Gamers</p>

        <p style="margin-bottom: 40px; font-size: 1.1rem; color: #888; font-family: 'Consolas', monospace;">
            See in the dark. No lag. Open source.
        </p>

        <a href="https://github.com/yourusername/noctis/releases/latest" class="btn">
            Download for Windows
        </a>

        <div class="meta">
            <p>v1.0.0 // <a href="https://github.com/yourusername/noctis">View Source</a></p>
        </div>
    </div>
</body>

</html>
